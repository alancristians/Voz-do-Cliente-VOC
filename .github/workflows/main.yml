name: FinVoC Daily Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🥉 Etapa 1: Ingestão Bronze (Fontes)
        run: |
          echo "::group::Coleta Ranking BCB"
          python scripts/bcb_ingestion.py
          echo "::endgroup::"
          
          echo "::group::Coleta Google News"
          python scripts/news_ingestion.py
          echo "::endgroup::"
          
          echo "::group::Coleta Consumidor.gov.br"
          python scripts/consumidor_ingestion.py
          echo "::endgroup::"
          
          echo "::group::Coleta Assuntos BCB"
          python scripts/subject_ingestion.py
          echo "::endgroup::"

      - name: 🥈 Etapa 2: Transformação Prata (Limpeza)
        run: |
          python scripts/silver_transformation.py

      - name: 🥇 Etapa 3: Análise Ouro (Negócio)
        run: |
          python scripts/gold_analysis.py

      - name: 📦 Etapa 4: Atualizar Repositório (Commit e Push)
        run: |
          git config --global user.name 'Alan (FinVoC Bot)'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          mkdir -p data/bronze data/silver data/gold
          git add -f data/
          
          if git diff --staged --quiet; then
            echo "Nada novo para salvar."
          else
            git commit -m "data: medallion update with real complaint subjects [skip ci]"
            git push origin main
          fi