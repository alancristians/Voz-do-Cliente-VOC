name: FinVoC Daily Update

on:
  schedule:
    - cron: '0 0 * * *' # Executa diariamente à meia-noite
  workflow_dispatch: # Permite execução manual pelo botão "Run workflow"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Injeta a chave da Groq para que o script Gold consiga gerar os insights de IA
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Instalar bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🥉 Etapa 1: Ingestão Bronze (Fontes)"
        run: |
          echo "::group::Coleta Ranking BCB"
          python scripts/bcb_ingestion.py
          echo "::endgroup::"
          
          echo "::group::Coleta Google News"
          python scripts/news_ingestion.py
          echo "::endgroup::"
          
          echo "::group::Coleta Consumidor.gov.br"
          python scripts/consumidor_ingestion.py
          echo "::endgroup::"

      - name: "🥈 Etapa 2: Transformação Prata (Limpeza)"
        run: |
          echo "::group::Processamento Silver"
          python scripts/silver_transformation.py
          echo "::endgroup::"

      - name: "🥇 Etapa 3: Análise Ouro (IA & Negócio)"
        run: |
          echo "::group::Geração de Insights com Llama 3.3"
          python scripts/gold_analysis.py
          echo "::endgroup::"

      - name: "📦 Etapa 4: Atualizar Repositório (Commit e Push)"
        run: |
          # Configuração do usuário do Bot
          git config --global user.name 'Alan (FinVoC Bot)'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Garante a existência das pastas
          mkdir -p data/bronze data/silver data/gold
          
          # FORÇA a adição de toda a pasta data, ignorando o .gitignore
          git add -f data/
          
          # Verifica se houve mudanças reais antes de subir
          if git diff --staged --quiet; then
            echo "Nada novo para salvar."
          else
            git commit -m "data: medallion update with AI insights [skip ci]"
            git push origin main
          fi